# When a stable GitHub Release is published, snapshot the docs tree that shipped with
# that tag into Docusaurus `versioned_docs/` and push to the default branch.
# Prereleases (e.g. semantic-release from rc/*) are skipped so the dropdown stays stable-only.
#
# Requires: default branch allows GitHub Actions to push (branch protection → allow actions bot).

name: Docs version snapshot

on:
  release:
    types: [published]

concurrency:
  group: docs-version-snapshot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  snapshot:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Semver from release tag
        id: meta
        shell: bash
        run: |
          t="${{ github.event.release.tag_name }}"
          ver="${t#v}"
          echo "tag=${t}" >> "$GITHUB_OUTPUT"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Checkout default branch (check idempotency)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Skip if snapshot already exists
        id: skip
        shell: bash
        run: |
          ver="${{ steps.meta.outputs.version }}"
          if [ -d "apps/docs/versioned_docs/version-${ver}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Doc snapshot for ${ver} already present on ${{ github.event.repository.default_branch }}."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release tag
        if: steps.skip.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.skip.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.skip.outputs.skip != 'true'
        run: npm ci

      - name: Docusaurus docs:version
        if: steps.skip.outputs.skip != 'true'
        working-directory: apps/docs
        run: npx docusaurus docs:version "${{ steps.meta.outputs.version }}"

      - name: Pack versioned tree
        if: steps.skip.outputs.skip != 'true'
        run: |
          tar -czf /tmp/aura-doc-snapshot.tgz \
            apps/docs/versioned_docs \
            apps/docs/versioned_sidebars \
            apps/docs/versions.json

      - name: Checkout default branch (apply snapshot)
        if: steps.skip.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Unpack snapshot
        if: steps.skip.outputs.skip != 'true'
        run: tar -xzf /tmp/aura-doc-snapshot.tgz

      - name: Commit and push
        if: steps.skip.outputs.skip != 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/docs/versioned_docs apps/docs/versioned_sidebars apps/docs/versions.json
          if git diff --staged --quiet; then
            echo "No staged changes; nothing to push."
            exit 0
          fi
          git commit -m "docs: Docusaurus snapshot for ${{ steps.meta.outputs.version }} [skip ci]"
          git push origin "HEAD:${DEFAULT_BRANCH}"
